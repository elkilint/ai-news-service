<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>AI Elkin Dashboard</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0a0f1c;
  color: #e5e7eb;
}

/* HEADER */
header {
  padding: 25px;
  background: #0f172a;
  border-bottom: 1px solid #1f2937;
  text-align: center;
}

h1 {
  margin: 0;
  color: #38bdf8;
}

/* CONTROLS */
.controls {
  max-width: 900px;
  margin: 20px auto;
  display: flex;
  gap: 10px;
  padding: 0 20px;
}

input {
  flex: 1;
  padding: 10px;
  border-radius: 8px;
  border: none;
  outline: none;
}

button {
  background: #1d4ed8;
  color: white;
  border: none;
  padding: 10px 15px;
  border-radius: 8px;
  cursor: pointer;
}

button:hover {
  background: #2563eb;
}

/* FILTERS */
.filters {
  max-width: 900px;
  margin: 10px auto;
  display: flex;
  gap: 10px;
  padding: 0 20px;
}

.filter {
  background: #111827;
  border: 1px solid #1f2937;
  padding: 6px 10px;
  border-radius: 20px;
  cursor: pointer;
  font-size: 13px;
}

.filter:hover {
  border-color: #38bdf8;
}

/* CARDS */
.container {
  max-width: 900px;
  margin: 20px auto;
  padding: 0 20px;
}

.card {
  background: #111827;
  border: 1px solid #1f2937;
  border-radius: 12px;
  padding: 15px;
  margin-bottom: 12px;
  transition: 0.2s;
}

.card:hover {
  transform: translateY(-2px);
  border-color: #38bdf8;
}

.title {
  font-size: 15px;
  font-weight: bold;
}

.source {
  font-size: 12px;
  color: #9ca3af;
  margin: 5px 0;
}

a {
  color: #22c55e;
  font-size: 13px;
  text-decoration: none;
}
</style>
</head>

<body>

<header>
  <h1>Pili News - AI Dashboard</h1>
</header>

<!-- SEARCH -->
<div class="controls">
  <input id="searchInput" placeholder="Search AI, tech, startups..." />
  <button onclick="searchNews()">Search</button>
</div>

<!-- FILTERS -->
<div class="filters">
  <div class="filter" onclick="loadNews('artificial intelligence')">AI</div>
  <div class="filter" onclick="loadNews('technology')">Tech</div>
  <div class="filter" onclick="loadNews('business')">Business</div>
  <div class="filter" onclick="loadNews('startups')">Startups</div>
</div>

<!-- NEWS -->
<div class="container" id="news">
  Loading...
</div>

<script>

async function loadNews(topic = "artificial intelligence") {
  const res = await fetch(`/news?topic=${topic}`);
  const data = await res.json();

  render(data.articles);
}

function render(articles) {
  const container = document.getElementById('news');
  container.innerHTML = '';

  articles.forEach(a => {
    container.innerHTML += `
      <div class="card">
        <div class="title">${a.title}</div>
        <div class="source">${a.source}</div>
        <a href="${a.url}" target="_blank">Read →</a>
      </div>
    `;
  });
}

function searchNews() {
  const value = document.getElementById('searchInput').value;
  if (value) loadNews(value);
}

loadNews();

</script>

</body>
</html>
